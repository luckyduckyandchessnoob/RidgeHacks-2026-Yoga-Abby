<!DOCTYPE html>
<html>
    <head>
        <title>Climate Crisis</title>
        <link href="styles.css" rel="stylesheet" />

    </head>
    <body>
        <audio id = "wompSound" src = "womp-womp.mp3"></audio>
        <audio id = "triumphSound" src = "Triumph.mp3"></audio>
        <audio id = "applauseSound" src = "applause.mp3"></audio>
        <p id = "fog"></p>
        <div class = "container">
        <p id = "pInitial">
            <b>This is the year 2030</b>
            <br>
             You are the new ruler! Make decisions to lead America to greatness by 2100. Let's Make American Great Again!
        </p>
        <button onclick="startGame()" id = "start">Start</button>
        <p id = "question"></p>
        <button id = "yesButton" onclick = "choose('yes')">YES</button>
        <button id = "noButton" onclick = "choose('no')">NO</button><br>
       
    </div>
    <div class = "metric">
    Money: <span id="money"></span><br>
    Smiles: <span id="smiles"></span><br>
    Nature:<span id="nature"></span><br>
    Energy:<span id="energy"></span><br>
    Future:<span id="future"></span>
    </div>
    <script src="script.js"></script>
    </body>
</html>
